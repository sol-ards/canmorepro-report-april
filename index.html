<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>캔모어PRO 임상 운영 분석 리포트</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary:#1B2A4A;--secondary:#2E5090;--accent:#4A90D9;
            --bg:#F8F9FA;--card-bg:#FFFFFF;--text:#2C3E50;--border:#E5E7EB;
        }
        *{box-sizing:border-box;margin:0;padding:0;}
        body{font-family:'Pretendard','Noto Sans KR',sans-serif;background-color:var(--bg);color:var(--text);line-height:1.6;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;}
        .container{max-width:800px;margin:0 auto;padding:60px 20px;text-align:center;}
        h1{font-size:2.5rem;color:var(--primary);margin-bottom:8px;font-weight:700;}
        .subtitle{font-size:1.2rem;color:var(--secondary);margin-bottom:40px;}
        .card-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:20px;margin-bottom:40px;}
        .card{background:var(--card-bg);padding:32px 24px;border-radius:12px;box-shadow:0 4px 12px rgba(0,0,0,.08);text-decoration:none;color:var(--text);transition:transform .2s,box-shadow .2s;border-top:4px solid var(--accent);}
        .card:hover{transform:translateY(-4px);box-shadow:0 8px 24px rgba(0,0,0,.12);}
        .card-icon{font-size:2.5rem;margin-bottom:12px;}
        .card-title{font-size:1.2rem;font-weight:700;color:var(--primary);margin-bottom:8px;}
        .card-desc{font-size:.9rem;color:#666;}
        footer{text-align:center;padding:20px;color:#888;font-size:.85rem;}
        @media(max-width:600px){.card-grid{grid-template-columns:1fr;}h1{font-size:1.8rem;}}
    </style>
</head>
<body>
    <div class="container">
        <h1>캔모어PRO 임상 운영 분석</h1>
        <p class="subtitle">2025년 4월 리포트</p>
        <div class="card-grid">
            <a href="canmorepro_keymetrics.html" class="card">
                <div class="card-icon">📊</div>
                <div class="card-title">주요 지표</div>
                <div class="card-desc">핵심 KPI 및 운영 지표 현황</div>
            </a>
            <a href="canmorepro_patientprofile.html" class="card">
                <div class="card-icon">👥</div>
                <div class="card-title">회원 등록 현황</div>
                <div class="card-desc">환자 등록 및 프로필 분석</div>
            </a>
            <a href="canmorepro_symptom.html" class="card">
                <div class="card-icon">🩺</div>
                <div class="card-title">증상 기록 분석</div>
                <div class="card-desc">증상 데이터 트렌드 분석</div>
            </a>
            <a href="canmorepro_usability.html" class="card">
                <div class="card-icon">📱</div>
                <div class="card-title">미션 사용성 분석</div>
                <div class="card-desc">앱 미션 기능 사용성 현황</div>
            </a>
        </div>
    </div>
    <footer>캔모어PRO &copy; 2025</footer>
</body>
</html>
